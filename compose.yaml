services:
  embedder:
    image: ollama/ollama:0.15.1
    container_name: embedder_container
    ports:
      - 11435:11434
    volumes:
      - ./embedder/data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull nomic-embed-text && wait"
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  vector_db:
    image: qdrant/qdrant:latest
    container_name: vector_db_container
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ./db/data:/qdrant/storage:z

  app:
    container_name: fastapi_app
    build:
      context: ./app
      dockerfile: Dockerfile
    image: rag-api-image
    depends_on:
      - embedder
      - vector_db
    ports:
      - 8088:8088
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/health" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    env_file:
      - ./app/.env/.env
