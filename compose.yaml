services:
  embedder:
    container_name: embedder_container
    build:
      context: ./embedder
      dockerfile: Dockerfile
    image: embedder_image
    networks:
      - backend_net
    volumes:
      - ./embedder/data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  vector_db:
    image: qdrant/qdrant:latest
    container_name: vector_db_container
    networks:
      - backend_net
    volumes:
      - ./db/data:/qdrant/storage:z

  app:
    container_name: fastapi_app
    build:
      context: ./app
      dockerfile: Dockerfile
    image: rag-api-image
    depends_on:
      - embedder
      - vector_db
    networks:
      - backend_net
      - frontend_net
    ports:
      - 8088:8088
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/health" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    env_file:
      - ./app/.env/.env

  frontend:
    container_name: fultter_app
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=${BACKEND_URL}
    image: fultter_app
    depends_on:
      - app
    networks:
      - frontend_net
    ports:
      - 80:80

networks:
  frontend_net:
    driver: bridge
  backend_net:
    internal: true
